<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Blocks — redirecting</title>
    <script>
      (function () {
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace("/blocks/" + search + hash);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Blocks…</p>
  </body>
</html>
