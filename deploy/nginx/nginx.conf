# MycoDAO blocks-proxy — blue/green upstream switcher

worker_processes auto;
worker_rlimit_nofile 16384;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;

  log_format main '$remote_addr $host "$request" $status $body_bytes_sent '
                  'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main buffer=32k flush=1s;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 75s;
  keepalive_requests 1000;

  proxy_buffering off;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  proxy_connect_timeout 10s;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/xml image/svg+xml font/woff2;

  resolver 127.0.0.11 valid=5s ipv6=off;
  resolver_timeout 5s;

  include /etc/nginx/conf.d/*.conf;
}
